    <main>
        <section class="content-section-form" style="background: var(--light-bg);">
            <div class="container-form">
                <h2>Send Us a Message</h2>
                <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">
                    Have questions? Fill out the form below and we'll get back to you within 24 hours.
                </p>

                <form style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px;">
                    <div class="form-group-form">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required="">
                    </div>

                    <div class="form-group-form">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required="">
                    </div>

                    <div class="form-group-form">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-group-form">
                        <label for="subject">Subject *</label>
                        <select id="subject" name="subject" required="">
                            <option value="">Select a subject...</option>
                            <option value="employment">Employment Inquiry</option>
                            <option value="employer">Employer Inquiry</option>
                            <option value="support">Deployment Support</option>
                            <option value="general">General Inquiry</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group-form">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" placeholder="Please enter your message..." required=""></textarea>
                    </div>

                    <button type="submit" class="btn-form btn-primary-form" style="width: 100%; padding: 1rem;">
                        Send Message
                    </button>
                </form>
            </div>
        </section>
    </main>
